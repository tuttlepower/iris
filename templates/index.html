<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iris Redirector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h3 mb-4">Iris URL Redirector</h1>
              <p class="text-muted">Send any URL to an archive, reader, or raw view in one click.</p>
              <div class="mb-3">
                <label for="targetUrl" class="form-label">Target URL</label>
                <input type="url" class="form-control" id="targetUrl" placeholder="https://example.com/article" required>
                <div class="form-text">HTTP/HTTPS URLs only. Local or private addresses are blocked.</div>
              </div>
              <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary" data-route="a">Archive.ph</button>
                <button class="btn btn-outline-primary" data-route="w">Wayback</button>
                <button class="btn btn-secondary" data-route="12">12ft</button>
                <button class="btn btn-success" data-route="r">Reader</button>
                <button class="btn btn-dark" data-route="raw">Raw HTML</button>
              </div>
            </div>
          </div>
          <div class="text-center text-muted mt-3">302 redirects only. Raw requests stream up to 1MB.</div>
        </div>
      </div>
    </div>
    <script>
      const input = document.getElementById('targetUrl');
      function redirect(route) {
        const value = input.value.trim();
        if (!value) return;
        const encoded = encodeURIComponent(value);
        window.location.href = `/${route}/${encoded}`;
      }
      document.querySelectorAll('button[data-route]').forEach(btn => {
        btn.addEventListener('click', (event) => {
          event.preventDefault();
          redirect(event.currentTarget.dataset.route);
        });
      });
    </script>
  </body>
</html>
